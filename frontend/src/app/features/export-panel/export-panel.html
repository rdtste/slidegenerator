<div class="export-panel">
  <h2>Export</h2>

  <div class="selected-template">
    <span class="template-label">Template:</span>
    <span class="template-value">{{ state.selectedTemplateId() === 'default' ? 'Standard-Design' : state.selectedTemplateId() }}</span>
  </div>

  <div class="export-actions">
    <button class="btn-primary" (click)="download('pptx')" [disabled]="!state.hasMarkdown() || exporting()">
      PowerPoint (.pptx)
    </button>
    <button class="btn-secondary" (click)="download('pdf')" [disabled]="!state.hasMarkdown() || exporting()">
      PDF
    </button>
  </div>

  <div class="status">{{ exportStatus() }}</div>

  <div class="slide-list">
    <h3>Folienübersicht</h3>
    @for (slide of state.slides(); track $index) {
      <div class="slide-item" [class.active]="state.selectedSlideIndex() === $index" (click)="selectSlide($index)">
        <span class="slide-num">{{ $index + 1 }}</span>
        <span class="slide-title">{{ slide.title || '(Ohne Titel)' }}</span>
        <span class="slide-layout">{{ slide.layout }}</span>
      </div>
    }
  </div>
</div>
