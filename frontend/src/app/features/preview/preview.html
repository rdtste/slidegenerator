<div class="preview-panel">
  @if (hasContent()) {
    <div class="slides-container">
      @for (slide of state.slides(); track $index) {
        <div
          class="slide-card"
          [class.active]="state.selectedSlideIndex() === $index"
          [style.--accent]="accentColor()"
          (click)="state.selectedSlideIndex.set($index)">

          <div class="slide-number">{{ $index + 1 }}</div>

          <!-- Layout badge -->
          <span class="layout-badge">{{ slide.layout }}</span>

          <!-- Title only -->
          @if (slide.title) {
            <h3 class="slide-title">{{ slide.title }}</h3>
          }
        </div>
      }
    </div>
  } @else {
    <div class="preview-placeholder">
      Die Folienvorschau erscheint hier nach der Generierung in Schritt 2.
    </div>
  }
</div>
