<div class="preview-panel">
  <h2>Vorschau (Marp)</h2>

  @if (hasContent()) {
    <iframe #previewFrame class="preview-iframe" [src]="iframeSrc()"></iframe>
  } @else {
    <div class="preview-placeholder">
      Die Live-Vorschau erscheint hier nach der Markdown-Generierung.
    </div>
  }
</div>
