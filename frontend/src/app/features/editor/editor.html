<div class="editor-panel">
  <h2>2. Markdown prüfen</h2>

  <div class="toolbar">
    <button class="btn-sm" (click)="toggleEdit()" [disabled]="!state.hasMarkdown()">
      {{ isEditing() ? 'Übernehmen' : 'Bearbeiten' }}
    </button>
    <span class="badge">{{ state.slideCount() }} Folien</span>
  </div>

  <div class="editor-view">
    @if (isEditing()) {
      <textarea
        class="markdown-editor"
        [(ngModel)]="editValue"
        placeholder="Markdown bearbeiten..."
      ></textarea>
    } @else {
      <pre class="markdown-preview">{{ state.markdown() || 'Generiertes Markdown erscheint hier...' }}</pre>
    }
  </div>
</div>
