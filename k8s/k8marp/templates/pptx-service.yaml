apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pptx-service
  labels:
    app.kubernetes.io/name: k8marp-pptx-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.pptxService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: k8marp-pptx-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8marp-pptx-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: pptx-service
          image: "{{ .Values.imagePrefix }}{{ .Values.pptxService.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.pptxService.port }}
          env:
            {{- range $key, $value := .Values.pptxService.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.pptxService.resources | nindent 12 }}
          volumeMounts:
            - name: templates
              mountPath: /data/templates
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.pptxService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: templates
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-templates
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pptx-service
spec:
  selector:
    app.kubernetes.io/name: k8marp-pptx-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8000
      targetPort: {{ .Values.pptxService.port }}
