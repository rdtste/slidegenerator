services:
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - PPTX_SERVICE_URL=http://pptx-service:8000
    volumes:
      - templates:/app/templates
      - presentations:/app/presentations
    depends_on:
      - pptx-service
    restart: unless-stopped

  pptx-service:
    build: ./pptx-service
    ports:
      - "8000:8000"
    env_file:
      - ./pptx-service/.env
    volumes:
      - templates:/app/templates
    restart: unless-stopped

volumes:
  templates:
  presentations:
