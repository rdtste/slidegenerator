services:
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - PPTX_SERVICE_URL=http://pptx-service:8000
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - templates:/app/templates
      - presentations:/app/presentations
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    depends_on:
      - pptx-service
    restart: unless-stopped

  pptx-service:
    build: ./pptx-service
    ports:
      - "8001:8000"
    env_file:
      - ./pptx-service/.env
    environment:
      - TEMPLATES_DIR=/app/templates
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - templates:/app/templates
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    restart: unless-stopped

volumes:
  templates:
  presentations:
